<!DOCTYPE html>
<!-- saved from url=(0043)https://lupin3rd666.github.io/yunjing-site/ -->
<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云境选香</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #fbf8f1;
      --card: #ffffff;
      --text: #332d25;
      --muted: #8a7e6b;
      --line: #e8dfcf;
      --gold: #c9a96a;
      --gold-deep: #b8924e;
      --gold-soft: rgba(201, 169, 106, 0.14);
      --shadow: 0 18px 45px rgba(70, 55, 30, 0.10);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(201, 169, 106, 0.18), transparent 20%),
        radial-gradient(circle at bottom left, rgba(201, 169, 106, 0.10), transparent 22%),
        linear-gradient(180deg, #f7f3ec 0%, #efe8db 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .stage {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .tips {
      width: 280px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(201,169,106,0.18);
      border-radius: 24px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .tips h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .tips p,
    .tips li {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .tips ul {
      margin: 0;
      padding-left: 18px;
    }

    .phone {
      width: 390px;
      max-width: 100%;
      min-height: 820px;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(251,248,241,0.96));
      border-radius: 38px;
      border: 1px solid rgba(201,169,106,0.22);
      box-shadow: 0 30px 80px rgba(74, 59, 38, 0.18);
      overflow: hidden;
      position: relative;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 80% 20%, rgba(201,169,106,0.08), transparent 18%),
        radial-gradient(circle at 20% 80%, rgba(201,169,106,0.07), transparent 22%);
    }

    .screen {
      min-height: 820px;
      padding: 22px 20px 28px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(145deg, #dbc28d, #b88c42);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(184, 140, 66, 0.35);
      flex-shrink: 0;
    }

    .brand-text .cn {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .brand-text .en {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .chip {
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: var(--gold-deep);
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(201,169,106,0.22);
    }

    .hero {
      margin-top: 26px;
      padding: 28px 20px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.88), rgba(248,243,235,0.95)),
        radial-gradient(circle at top right, rgba(201,169,106,0.18), transparent 25%);
      border: 1px solid rgba(201,169,106,0.2);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .hero .eyebrow {
      color: var(--gold-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: 3px;
    }

    .hero h1 span {
      display: block;
      font-size: 16px;
      letter-spacing: 1px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 10px;
    }

    .hero p {
      margin: 16px 0 22px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }

    .hero-art {
      height: 190px;
      border-radius: 24px;
      margin-bottom: 20px;
      background: url('') center/cover no-repeat;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: end;
      justify-content: start;
      padding: 16px;
      color: rgba(255,255,255,0.96);
      text-align: left;
    }

    .hero-art::before {
      content: none;
    }

    .hero-art-text {
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.38);
    }

    .hero-art-text strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .hero-art-text span {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    .primary-btn,
    .ghost-btn,
    .option,
    .small-btn {
      border: none;
      cursor: pointer;
      transition: 0.24s ease;
      font-family: inherit;
    }

    .primary-btn {
      width: 100%;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #d4b478, #bb8f49);
      box-shadow: 0 16px 28px rgba(187, 143, 73, 0.26);
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 20px 36px rgba(187, 143, 73, 0.32);
    }

    .ghost-btn {
      width: 100%;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--gold-deep);
      background: rgba(201,169,106,0.08);
      border: 1px solid rgba(201,169,106,0.22);
      margin-top: 12px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .progress-track {
      width: 100%;
      height: 7px;
      background: #ede4d8;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #d4b478, #ba8f49);
      width: 0%;
      transition: width 0.32s ease;
    }

    .question-card,
    .result-card,
    .loading-card,
    .guide-card {
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(201,169,106,0.16);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .question-title {
      font-size: 26px;
      margin: 0 0 8px;
      letter-spacing: 1px;
    }

    .question-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      width: 100%;
      text-align: left;
      border-radius: 18px;
      padding: 16px 15px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.8px solid #d1c0a0;
      flex-shrink: 0;
      transition: 0.2s ease;
      background: #fff;
    }

    .option:hover {
      border-color: rgba(201,169,106,0.55);
      box-shadow: 0 12px 20px rgba(84, 67, 39, 0.07);
      transform: translateY(-1px);
    }

    .option.active {
      border-color: rgba(201,169,106,0.88);
      background: linear-gradient(180deg, rgba(255,255,255,1), rgba(251,246,237,1));
      box-shadow: 0 14px 24px rgba(84, 67, 39, 0.10);
    }

    .option.active::before {
      border-color: #c39b58;
      background: radial-gradient(circle at center, #c39b58 0 40%, transparent 41% 100%);
    }

    .art-panel {
      margin-top: 16px;
      height: 170px;
      border-radius: 22px;
      background: url('') center/cover no-repeat;
      padding: 16px;
      display: flex;
      align-items: end;
      color: rgba(255,255,255,0.96);
      position: relative;
      overflow: hidden;
    }

    .art-panel::after {
      content: "藏香意象图";
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.72);
      letter-spacing: 1px;
    }

    .art-panel small {
      position: relative;
      z-index: 1;
      line-height: 1.7;
      font-size: 12px;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 10px rgba(0,0,0,0.38);
    }

    .loading-wrap {
      min-height: 580px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .spinner {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 18px;
      border: 7px solid rgba(201,169,106,0.14);
      border-top-color: var(--gold);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      margin: 0 0 10px;
      font-size: 26px;
    }

    .loading-desc {
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
      margin: 0;
    }

    .result-top {
      display: flex;
      align-items: stretch;
      gap: 14px;
    }

    .match-circle {
      width: 102px;
      height: 102px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, #fff 46%, transparent 47%),
        conic-gradient(#c9a96a calc(var(--percent) * 1%), #ece4d7 0);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      position: relative;
    }

    .match-circle::before {
      content: "";
      position: absolute;
      inset: 11px;
      border-radius: 50%;
      background: #fffaf2;
      box-shadow: inset 0 0 0 1px rgba(201,169,106,0.12);
    }

    .match-circle strong,
    .match-circle span {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .match-circle strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .match-circle span {
      display: block;
      font-size: 11px;
      color: var(--muted);
    }

    .result-meta {
      flex: 1;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: var(--gold-deep);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-title {
      font-size: 24px;
      line-height: 1.35;
      margin: 0 0 8px;
    }

    .result-subtitle {
      color: var(--muted);
      line-height: 1.8;
      font-size: 13px;
      margin: 0;
    }

    .result-image {
      height: 190px;
      border-radius: 22px;
      margin: 18px 0 16px;
      background: url('') center/cover no-repeat;
      position: relative;
      overflow: hidden;
      padding: 18px;
      color: rgba(255,255,255,0.96);
      display: flex;
      align-items: flex-end;
    }

    .result-image::after {
      content: "藏香主图";
      position: absolute;
      right: 14px;
      top: 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.72);
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 15px;
      letter-spacing: 1px;
    }

    .ingredient-list,
    .tag-list,
    .more-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ingredient,
    .tag,
    .more-item {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      background: #f7f2e8;
      border: 1px solid #ebdeca;
      color: #674f25;
    }

    .explain {
      margin-top: 16px;
      padding: 16px;
      background: #fbf7ef;
      border: 1px solid #eee1cf;
      border-radius: 18px;
      color: #5c4b34;
      font-size: 13px;
      line-height: 1.9;
    }

    .more-card {
      margin-top: 16px;
      padding: 16px;
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(201,169,106,0.16);
      border-radius: 18px;
    }

    .more-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .more-items {
      display: grid;
      gap: 10px;
    }

    .more-product {
      padding: 13px;
      border: 1px solid #eee1cf;
      background: #fff;
      border-radius: 16px;
    }

    .more-product strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .more-product span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    .result-actions {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .small-btn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 700;
      background: #fff;
      color: var(--text);
      border: 1px solid #ebdeca;
    }

    .small-btn:hover {
      border-color: rgba(201,169,106,0.6);
      transform: translateY(-1px);
    }

    .guide-card {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.8;
    }

    .footer-note {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.8;
    }

    @media (max-width: 980px) {
      .tips {
        width: 100%;
        max-width: 390px;
        order: 2;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .phone {
        border-radius: 28px;
        min-height: auto;
      }

      .screen {
        min-height: auto;
      }

      .hero h1 {
        font-size: 28px;
      }

      .question-title,
      .loading-title {
        font-size: 22px;
      }

      .result-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
<main class="phone">
      <div id="app" class="screen">
        <div class="topbar">
          <div class="brand">
            <div class="logo">云</div>
            <div class="brand-text">
              <div class="cn">云境香藏</div>
              <div class="en">Digital Scent Experience</div>
            </div>
          </div>
          <div class="chip">云境甄选</div>
        </div>

        <section class="hero">
          <div class="eyebrow">藏式智慧 · 千年传承 · 现代科学</div>
          <div class="hero-art" style="background-image: linear-gradient(135deg, rgba(49,39,25,0.82), rgba(122,85,31,0.72)), url('sibuyidian.jpg');">
            <div class="hero-art-text">
              <strong>云境选香</strong>
              <span>科学匹配 · 源自《四部医典》</span>
            </div>
          </div>
          <h1>
            云境选香
            <span>科学匹配 · 源自《四部医典》</span>
          </h1>
          <p>
            根据您的使用场景、状态、香气偏好和空间需求，
            从使用场景、当下状态到香气偏好，为您筛选更贴近日常使用习惯的选香方向。
          </p>
          <button class="primary-btn" onclick="startQuiz()">开始测评</button>
          <button class="ghost-btn" onclick="showHelp()">选香说明</button>
        </section>

        <div class="guide-card">
          <strong>选香说明</strong><br>
          本测评围绕使用场景、当下状态、香气偏好与空间需求展开，完成后即可查看更贴近您当前需求的推荐结果。
        </div>

        <div class="footer-note">
          选择后将自动进入下一题，无需手动切换。
        </div>
      </div>
    </main>
  </div>

  <script>

    const CONFIG = {
      brand: {
        name: '云境香藏',
        shortName: '云',
        title: '云境选香',
        subtitle: '科学匹配 · 源自《四部医典》',
        note: '藏式智慧 · 千年传承 · 现代科学'
      },
      questions: [
        {
          id: 'scene',
          image: 'yixiang1.jpg',
          title: '您的使用场景是？',
          subtitle: '请选择一项最符合您实际情况的选项',
          options: [
            { text: '办公书房', weights: { focus: 4, fresh: 3, calm: 1 } },
            { text: '瑜伽冥想', weights: { calm: 4, zen: 3, warm: 1 } },
            { text: '出行车载', weights: { fresh: 4, focus: 2, clean: 2 } },
            { text: '居家睡前', weights: { sleep: 5, calm: 3, warm: 2 } }
          ]
        },
        {
          id: 'state',
          image: 'yixiang2.jpg',
          title: '您当前最想改善的状态是？',
          subtitle: '请选择一项最符合您当前感受的选项',
          options: [
            { text: '失眠难安', weights: { sleep: 5, calm: 2 } },
            { text: '焦虑烦躁', weights: { calm: 5, warm: 2, zen: 1 } },
            { text: '注意力不集中', weights: { focus: 5, fresh: 2 } },
            { text: '疲惫乏力', weights: { fresh: 4, focus: 3 } }
          ]
        },
        {
          id: 'scent',
          image: 'yixiang3.jpg',
          title: '您偏好的香气类型是？',
          subtitle: '香气偏好会影响最终推荐风格',
          options: [
            { text: '温润木质调', weights: { warm: 4, sleep: 2, zen: 2 } },
            { text: '清新草本调', weights: { fresh: 4, clean: 3 } },
            { text: '醇厚药香调', weights: { clean: 3, warm: 3, calm: 2 } },
            { text: '淡雅花香调', weights: { calm: 3, zen: 3, fresh: 1 } }
          ]
        },
        {
          id: 'feeling',
          image: 'yixiang4.jpg',
          title: '您希望香气带来的感受是？',
          subtitle: '这一题更偏向情绪结果',
          options: [
            { text: '宁心安神', weights: { sleep: 5, calm: 3 } },
            { text: '舒缓放松', weights: { calm: 5, zen: 2 } },
            { text: '醒神提气', weights: { focus: 5, fresh: 3 } },
            { text: '净化空气', weights: { clean: 5, fresh: 2 } }
          ]
        },
        {
          id: 'frequency',
          image: 'yixiang1.jpg',
          title: '您使用香品的频率？',
          subtitle: '不同使用频率会影响推荐方向',
          options: [
            { text: '每日必用', weights: { fresh: 2, calm: 2, clean: 2 } },
            { text: '偶尔放松', weights: { calm: 3, sleep: 2 } },
            { text: '特定仪式', weights: { zen: 4, warm: 2 } },
            { text: '初次尝试', weights: { fresh: 2, calm: 2, sleep: 1 } }
          ]
        },
        {
          id: 'care',
          image: 'yixiang2.jpg',
          title: '您更在意香的哪方面？',
          subtitle: '这里决定最终解释文案的重点方向',
          options: [
            { text: '助眠功效', weights: { sleep: 5 } },
            { text: '舒缓压力', weights: { calm: 5 } },
            { text: '调理气机', weights: { warm: 4, zen: 2 } },
            { text: '环境氛围', weights: { zen: 3, clean: 2, fresh: 2 } }
          ]
        },
        {
          id: 'space',
          image: 'yixiang3.jpg',
          title: '您所处的空间大小？',
          subtitle: '不同空间对香气感受会有所不同',
          options: [
            { text: '小空间（卧室 / 书房）', weights: { sleep: 2, calm: 2, fresh: 1 } },
            { text: '中等空间（客厅）', weights: { clean: 2, warm: 2, zen: 1 } },
            { text: '大空间（茶室 / 会所）', weights: { zen: 3, warm: 3 } }
          ]
        },
        {
          id: 'style',
          image: 'yixiang4.jpg',
          title: '最终题：您更喜欢的风格氛围？',
          subtitle: '选择后将自动进入专属香方匹配',
          options: [
            { text: '静谧禅意', weights: { zen: 5, calm: 2 } },
            { text: '自然清新', weights: { fresh: 5, clean: 2 } },

        },
        {

          image: 'huanjing3.jpg',

          subtitle: '偏办公、提神、清爽聚焦方向。',
          ingredients: ['迷迭草本', '柏木', '白檀', '龙胆草'],
          tags: ['办公', '提神', '聚焦', '草本清新'],
          strengths: ['focus', 'fresh', 'clean'],
          explain: '更适合办公书房、学习空间和白天使用。整体香气偏清透，不容易闷，适合想提升专注度、提振精神和改善疲惫状态的人。',
          imageTitle: '办公书房 · 清醒专注场景',
          imageDesc: '清透醒神，适合书房、办公与白天使用。'
        },
        {
          id: 'clean_formula',
          image: 'huanjing4.jpg',
          title: '「草木净境 · 清新净气方」',
          badge: '环境推荐配方',
          subtitle: '偏空间净化、日常氛围、清洁感方向。',
          ingredients: ['艾草', '柏木', '藿香', '高原草本'],
          tags: ['净气', '清新', '车载', '日常空间'],
          strengths: ['clean', 'fresh', 'focus'],
          explain: '如果您更在意空间气息、环境氛围和日常净化感，这一支会更合适。整体更适合客厅、车载、公共空间等使用频率较高的场景。',
          imageTitle: '日常空间 · 清洁舒适场景',
          imageDesc: '草本清新，适合客厅、车载与日常空间。'
        }
      ]
    };

    const app = document.getElementById('app');

    const state = {
      step: -1,               // -1 代表开始页
      answers: [],            // 记录用户选择
      selectedOption: null,
      result: null,
      loading: false
    };

    function escapeHtml(str = '') {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getProgressPercent() {
      if (state.step < 0) return 0;
      return Math.round(((state.step + 1) / CONFIG.questions.length) * 100);
    }

    function getHeroArtStyle() {
      return `background-image: url('sibuyidian.jpg');`;
    }

    function getQuestionArtStyle(question) {
      const image = question?.image || 'yixiang1.jpg';
      return `background-image: url('${image}');`;
    }

    function getResultImageStyle(result) {
      const image = result?.image || 'huanjing1.jpg';
      return `background-image: url('${image}');`;
    }

    function render() {
      if (state.loading) {
        renderLoading();
        return;
      }

      if (state.result) {
        renderResult();
        return;
      }

      if (state.step < 0) {
        renderStart();
        return;
      }

      renderQuestion();
    }

    function renderStart() {
      app.innerHTML = `
        <div class="topbar">
          <div class="brand">
            <div class="logo">${escapeHtml(CONFIG.brand.shortName)}</div>
            <div class="brand-text">
              <div class="cn">${escapeHtml(CONFIG.brand.name)}</div>
              <div class="en">Digital Scent Experience</div>
            </div>
          </div>
          <div class="chip">云境甄选</div>
        </div>

        <section class="hero">
          <div class="eyebrow">${escapeHtml(CONFIG.brand.note)}</div>
          <div class="hero-art" style="${getHeroArtStyle()}">
            <div class="hero-art-text">
              <strong>${escapeHtml(CONFIG.brand.title)}</strong>
              <span>科学匹配 · 源自《四部医典》</span>
            </div>
          </div>
          <h1>
            ${escapeHtml(CONFIG.brand.title)}
            <span>${escapeHtml(CONFIG.brand.subtitle)}</span>
          </h1>
          <p>
            根据您的使用场景、状态、香气偏好和空间需求，
            从使用场景、当下状态到香气偏好，为您筛选更贴近日常使用习惯的选香方向。
          </p>
          <button class="primary-btn" onclick="startQuiz()">开始测评</button>
          <button class="ghost-btn" onclick="showHelp()">选香说明</button>
        </section>

        <div class="guide-card">
          <strong>选香说明</strong><br />
          本测评围绕使用场景、当下状态、香气偏好与空间需求展开，完成后即可查看更贴近您当前需求的推荐结果。
        </div>

        <div class="footer-note">
          选择后将自动进入下一题，无需手动切换。
        </div>
      `;
    }

    function renderQuestion() {
      const question = CONFIG.questions[state.step];
      const progress = getProgressPercent();

      app.innerHTML = `
        <div class="topbar">
          <div class="brand">
            <div class="logo">${escapeHtml(CONFIG.brand.shortName)}</div>
            <div class="brand-text">
              <div class="cn">${escapeHtml(CONFIG.brand.title)}</div>
              <div class="en">Scientific Match</div>
            </div>
          </div>
          <div class="chip">当前 ${state.step + 1} / ${CONFIG.questions.length}</div>
        </div>

        <div class="meta-row">
          <span>第 ${state.step + 1} 题</span>
          <span>${progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" style="width:${progress}%"></div>
        </div>

        <section class="question-card">
          <h2 class="question-title">${escapeHtml(question.title)}</h2>
          <p class="question-subtitle">${escapeHtml(question.subtitle)}</p>

          <div class="options">
            ${question.options.map((option, index) => `
              <button
                class="option ${state.selectedOption === index ? 'active' : ''}"
                onclick="chooseOption(${index})"
              >
                ${escapeHtml(option.text)}
              </button>
            `).join('')}
          </div>

          <div class="art-panel" style="${getQuestionArtStyle(question)}">
            <small>
              香气意象 · 藏香草本 · 静心时刻
            </small>
          </div>
        </section>

        <div class="result-actions">
          <button class="small-btn" onclick="goPrev()">返回上一题</button>
        </div>

        <div class="footer-note">
          选项点击后会自动进入下一题，不需要再点“下一步”。
        </div>
      `;
    }

    function renderLoading() {
      app.innerHTML = `
        <div class="topbar">
          <div class="brand">
            <div class="logo">${escapeHtml(CONFIG.brand.shortName)}</div>
            <div class="brand-text">
              <div class="cn">${escapeHtml(CONFIG.brand.title)}</div>
              <div class="en">Intelligent Matching</div>
            </div>
          </div>
          <div class="chip">正在匹配</div>
        </div>

        <div class="loading-wrap">
          <section class="loading-card">
            <div class="spinner"></div>
            <h2 class="loading-title">正在为您整理选香结果...</h2>
            <p class="loading-desc">
              请稍候片刻，我们会根据您的选择给出更适合的推荐。
            </p>
          </section>
        </div>
      `;
    }

    function renderResult() {
      const result = state.result;
      const moreList = result.more || [];

      app.innerHTML = `
        <div class="topbar">
          <div class="brand">
            <div class="logo">${escapeHtml(CONFIG.brand.shortName)}</div>
            <div class="brand-text">
              <div class="cn">${escapeHtml(CONFIG.brand.title)}</div>
              <div class="en">Result</div>
            </div>
          </div>
          <div class="chip">匹配完成</div>
        </div>

        <section class="result-card">
          <div class="result-top">
            <div class="match-circle" style="--percent:${result.percent};">
              <div>
                <strong>${result.percent}%</strong>
                <span>匹配度</span>
              </div>
            </div>
            <div class="result-meta">
              <div class="badge">${escapeHtml(result.badge)}</div>
              <h2 class="result-title">${escapeHtml(result.title)}</h2>
              <p class="result-subtitle">${escapeHtml(result.subtitle)}</p>
            </div>
          </div>

          <div class="result-image" style="${getResultImageStyle(result)}">
            <div>
              <strong style="display:block;font-size:18px;margin-bottom:6px;letter-spacing:1px;">${escapeHtml(result.imageTitle)}</strong>
              <span style="font-size:12px;color:rgba(255,255,255,0.78);line-height:1.7;">${escapeHtml(result.imageDesc)}</span>
            </div>
          </div>

          <h3 class="section-title">核心成分</h3>
          <div class="ingredient-list">
            ${result.ingredients.map(item => `<span class="ingredient">${escapeHtml(item)}</span>`).join('')}
          </div>

          <div class="explain">
            <strong>功效解释：</strong><br />
            ${escapeHtml(result.explain)}
          </div>

          <div class="more-card">
            <div class="more-title">
              <span>匹配标签</span>
              <span>与您更契合的香气关键词</span>
            </div>
            <div class="tag-list">
              ${result.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
          </div>

          <div class="more-card">
            <div class="more-title">
              <span>更多相似推荐</span>
              <span>也可从相近方向继续挑选</span>
            </div>
            <div class="more-items">
              ${moreList.map(item => `
                <div class="more-product">
                  <strong>${escapeHtml(item.title)}</strong>
                  <span>${escapeHtml(item.subtitle)}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="result-actions">
            <button class="primary-btn" onclick="showDetailPlaceholder()">立即查看香品详情</button>
            <button class="small-btn" onclick="restartQuiz()">重新测评</button>
          </div>
        </section>

        <div class="guide-card">
          <strong>选香小贴士：</strong><br />
          香气偏好会随着场景、时间和心境变化而不同，欢迎在不同状态下再次测评，找到更适合自己的选择。
        </div>
      `;
    }

    function chooseOption(index) {
      state.selectedOption = index;
      render();

      setTimeout(() => {
        const question = CONFIG.questions[state.step];
        const selected = question.options[index];
        state.answers[state.step] = {
          questionId: question.id,
          questionTitle: question.title,
          optionText: selected.text,
          weights: selected.weights
        };
        state.selectedOption = null;

        if (state.step === CONFIG.questions.length - 1) {
          state.loading = true;
          render();
          setTimeout(() => {
            state.loading = false;
            state.result = calculateResult();
            render();
          }, 2400);
        } else {
          state.step += 1;
          render();
        }
      }, 220);
    }

    function calculateResult() {
      const totalScores = {
        sleep: 0,
        calm: 0,
        focus: 0,
        fresh: 0,
        clean: 0,
        warm: 0,
        zen: 0
      };

      state.answers.forEach(answer => {
        if (!answer || !answer.weights) return;
        Object.keys(answer.weights).forEach(key => {
          totalScores[key] = (totalScores[key] || 0) + answer.weights[key];
        });
      });

      const scoredFormulas = CONFIG.formulas.map(formula => {
        const score = formula.strengths.reduce((sum, key, idx) => {
          const multiplier = idx === 0 ? 1.2 : 1;
          return sum + (totalScores[key] || 0) * multiplier;
        }, 0);
        return { ...formula, score };
      }).sort((a, b) => b.score - a.score);

      const best = scoredFormulas[0];
      const second = scoredFormulas[1];
      const third = scoredFormulas[2];

      const maxPossibleScore = 35;
      const normalized = Math.min(98, Math.max(82, Math.round((best.score / maxPossibleScore) * 100)));

      return {
        ...best,
        percent: normalized,
        more: [second, third].filter(Boolean)
      };
    }

    function startQuiz() {
      state.step = 0;
      state.answers = [];
      state.selectedOption = null;
      state.result = null;
      state.loading = false;
      render();
    }

    function restartQuiz() {
      state.step = -1;
      state.answers = [];
      state.selectedOption = null;
      state.result = null;
      state.loading = false;
      render();
    }

    function goPrev() {
      if (state.step <= 0) {
        state.step = -1;
      } else {
        state.step -= 1;
        state.answers = state.answers.slice(0, state.step + 1);
      }
      state.selectedOption = null;
      render();
    }

    function showHelp() {
      alert('请根据您当前的真实感受完成选择。\n\n测评共 8 题，完成后将为您呈现更适合的选香结果。');
    }

    function showDetailPlaceholder() {
      alert('香品详情页即将开放，您可先完成测评并记录本次推荐结果。');
    }

    render();
  </script>
